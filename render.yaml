# Render Blueprint - https://render.com/docs/blueprint-spec
# Deploy: https://render.com/deploy?repo=https://github.com/xprilion/OpenMLR

services:
  # Main web application
  - type: web
    name: openmlr-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: openmlr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: openmlr-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: USE_BACKGROUND_JOBS
        value: "true"
      - key: USE_REDIS_PUBSUB
        value: "true"
      # User needs to add these after deploy
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  # Background worker
  - type: worker
    name: openmlr-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: backend/.venv/bin/celery -A openmlr.celery_app worker --loglevel=info --concurrency=2 -Q default,agent
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: openmlr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: openmlr-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: openmlr-web
          envVarKey: JWT_SECRET_KEY
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  # Redis for job queue and pub/sub
  - type: redis
    name: openmlr-redis
    plan: free
    ipAllowList: []

databases:
  # PostgreSQL database
  - name: openmlr-db
    plan: free
    databaseName: openmlr
    user: openmlr
