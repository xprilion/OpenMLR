####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-js:2025.3
profile:
  name: qodana.recommended
bootstrap: |
  # Install frontend dependencies so Qodana can resolve TypeScript imports
  corepack enable && corepack prepare pnpm@latest --activate
  cd frontend && pnpm install --frozen-lockfile
include:
  - name: CheckDependencyLicenses
exclude:
  - name: All
    paths:
      - backend
      - site
      - assets
      - node_modules
      - frontend/dist
      - frontend/node_modules
