# Development override - enables live reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#    or: make dev-docker
#
# Key fix: .venv is kept in an anonymous volume so the host's macOS/Windows
# .venv doesn't overwrite the Linux-native one inside the container.

services:
  # Web with live reload - mounts source code
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      uvicorn openmlr.app:app
      --host 0.0.0.0 --port 3000
      --reload --reload-dir /app/backend/openmlr
    volumes:
      - ./backend:/app/backend
      - backend-venv:/app/backend/.venv  # Isolate Linux .venv from host mount
      - ./frontend/dist:/app/frontend/dist
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

  # Worker with auto-restart on code changes
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      watchmedo auto-restart
      --directory=/app/backend/openmlr
      --pattern=*.py
      --recursive
      --
      celery -A openmlr.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q default,agent
    volumes:
      - ./backend:/app/backend
      - backend-venv:/app/backend/.venv  # Isolate Linux .venv from host mount
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

  # Docs site with live reload (VitePress dev server)
  docs:
    image: node:20-slim
    working_dir: /app/site
    command: sh -c "npm install && npx vitepress dev docs --host 0.0.0.0 --port 4000"
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./site:/app/site
      - docs-node-modules:/app/site/node_modules  # Persist node_modules in volume
    profiles: []  # Override the 'docs' profile so it starts with dev compose
    environment:
      NODE_ENV: development

volumes:
  backend-venv:  # Named volume to keep Linux-native .venv isolated
  docs-node-modules:  # Persist docs node_modules across restarts
