####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-python-community:2025.3
projectJDK: "python3.12"
profile:
  name: qodana.recommended
bootstrap: |
  # Ensure Qodana uses Python 3.12+ for correct type hint inspection (PEP 604, PEP 585)
  python3.12 --version 2>/dev/null || python3 --version
include:
  - name: CheckDependencyLicenses
exclude:
  - name: All
    paths:
      - frontend
      - site
      - assets
      - node_modules
